<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: "Hello Website" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="container">
      <header>
        <h1>{{ page.title | default: "Hello Website" }}</h1>
      </header>

      <main>
        {{ content }}
      </main>

      <footer>
        <p>A simple static website demo.</p>
      </footer>
    </div>
  </body>
</html>
